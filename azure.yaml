name: updates
metadata:
  template: updates-infra

infra:
  provider: bicep
  path: infra

hooks:
  preprovision:
    windows:
      shell: pwsh
      run: |
        if (-not $env:GITHUB_REPOSITORY) {
          throw "GITHUB_REPOSITORY is required to create the GitHub federated credential. Run 'azd env set GITHUB_REPOSITORY sujithq/updates' and retry."
        }
        if (-not $env:GITHUB_BRANCH) {
          Write-Host "GITHUB_BRANCH not set. Defaulting to 'main'."
          azd env set GITHUB_BRANCH main
        }
    posix:
      shell: sh
      run: |
        if [ -z "$GITHUB_REPOSITORY" ]; then
          echo "GITHUB_REPOSITORY is required to create the GitHub federated credential. Run 'azd env set GITHUB_REPOSITORY sujithq/updates' and retry." >&2
          exit 1
        fi
        if [ -z "$GITHUB_BRANCH" ]; then
          echo "GITHUB_BRANCH not set. Defaulting to 'main'."
          azd env set GITHUB_BRANCH main
        fi
  postprovision:
    windows:
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        if ($env:FOUNDRY_PROJECT_ENDPOINT -and -not $env:FOUNDRY_PROJECT_RESOURCE_ID) {
          throw "FOUNDRY_PROJECT_RESOURCE_ID is required for Foundry RBAC assignment. Set it with 'azd env set FOUNDRY_PROJECT_RESOURCE_ID <resource-id>' and re-run provision."
        }
        if ($env:FOUNDRY_PROJECT_RESOURCE_ID) {
          if (-not $env:AZURE_PRINCIPAL_ID) {
            throw "AZURE_PRINCIPAL_ID is missing from azd outputs. Re-run 'azd provision'."
          }
          $existingAssignments = az role assignment list --assignee-object-id $env:AZURE_PRINCIPAL_ID --role "Azure AI User" --scope $env:FOUNDRY_PROJECT_RESOURCE_ID | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to query existing Azure AI User role assignment. Ensure the provisioning identity has permission to read role assignments at Foundry project scope."
          }
          if (@($existingAssignments).Count -eq 0) {
            az role assignment create --assignee-object-id $env:AZURE_PRINCIPAL_ID --assignee-principal-type ServicePrincipal --role "Azure AI User" --scope $env:FOUNDRY_PROJECT_RESOURCE_ID | Out-Null
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create Azure AI User role assignment. Ensure the provisioning identity has User Access Administrator (or Owner) on the Foundry project scope."
            }
            Write-Host "Assigned 'Azure AI User' on Foundry project scope to principal $($env:AZURE_PRINCIPAL_ID)."
          } else {
            Write-Host "'Azure AI User' role already assigned on Foundry project scope."
          }
        } else {
          Write-Host "FOUNDRY_PROJECT_RESOURCE_ID not set. Skipping Foundry RBAC assignment."
        }
        Write-Host "Azure resources provisioned. Run 'azd env get-values' to export environment values."
    posix:
      shell: sh
      run: |
        set -eu
        if [ -n "${FOUNDRY_PROJECT_ENDPOINT:-}" ] && [ -z "${FOUNDRY_PROJECT_RESOURCE_ID:-}" ]; then
          echo "FOUNDRY_PROJECT_RESOURCE_ID is required for Foundry RBAC assignment. Set it with 'azd env set FOUNDRY_PROJECT_RESOURCE_ID <resource-id>' and re-run provision." >&2
          exit 1
        fi
        if [ -n "${FOUNDRY_PROJECT_RESOURCE_ID:-}" ]; then
          if [ -z "${AZURE_PRINCIPAL_ID:-}" ]; then
            echo "AZURE_PRINCIPAL_ID is missing from azd outputs. Re-run 'azd provision'." >&2
            exit 1
          fi
          existing=$(az role assignment list --assignee-object-id "$AZURE_PRINCIPAL_ID" --role "Azure AI User" --scope "$FOUNDRY_PROJECT_RESOURCE_ID" --query "length(@)" -o tsv)
          if [ "$existing" = "0" ]; then
            az role assignment create --assignee-object-id "$AZURE_PRINCIPAL_ID" --assignee-principal-type ServicePrincipal --role "Azure AI User" --scope "$FOUNDRY_PROJECT_RESOURCE_ID" >/dev/null
            echo "Assigned 'Azure AI User' on Foundry project scope to principal $AZURE_PRINCIPAL_ID."
          else
            echo "'Azure AI User' role already assigned on Foundry project scope."
          fi
        else
          echo "FOUNDRY_PROJECT_RESOURCE_ID not set. Skipping Foundry RBAC assignment."
        fi
        echo "Azure resources provisioned. Run 'azd env get-values' to export environment values."
