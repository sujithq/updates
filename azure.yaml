name: updates
metadata:
  template: updates-infra

infra:
  provider: bicep
  path: infra

hooks:
  postprovision:
    windows:
      shell: pwsh
      run: |
        Write-Host "Azure resources provisioned. Run 'azd env get-values' to export environment values."
    posix:
      shell: sh
      run: |
        echo "Azure resources provisioned. Run 'azd env get-values' to export environment values."
