# Generate a weekly AI-curated digest of Azure/GitHub/DevTools announcements.
#
# Reads data/feeds.json, filters to the last 7 days, generates an AI summary
# via Foundry, writes a markdown file to digests/, and creates a GitHub Issue.
#
# Authentication uses the same runtime OIDC identity as fetch-feeds.yml.
# Required GitHub Secrets:
#   AZURE_CLIENT_ID                - Runtime user-assigned MI client ID
#   AZURE_TENANT_ID                - Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID          - Azure subscription ID
#   FOUNDRY_PROJECT_ENDPOINT       - Foundry project endpoint (for AI summary)
#
# Required GitHub Variables:
#   FOUNDRY_MODEL_DEPLOYMENT_NAME  - e.g. gpt-5.4

name: Weekly Digest

on:
  schedule:
    - cron: '0 7 * * 1'   # Every Monday at 07:00 UTC
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write   # commit digests/ to the repo
  issues: write     # create GitHub Issues
  id-token: write   # OIDC token for azure/login

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Generate weekly digest
        env:
          FOUNDRY_PROJECT_ENDPOINT: ${{ secrets.FOUNDRY_PROJECT_ENDPOINT }}
          FOUNDRY_MODEL_DEPLOYMENT_NAME: ${{ vars.FOUNDRY_MODEL_DEPLOYMENT_NAME }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/weekly_digest.py

      - name: Commit digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/
          git diff --staged --quiet || git commit -m "docs: weekly digest [skip ci]"
          git push
