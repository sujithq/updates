# Scan feed data daily for breaking changes, deprecations, and migration deadlines.
#
# Applies keyword heuristics + Foundry AI classification, then creates
# GitHub Issues for actionable items.
#
# Authentication uses the same runtime OIDC identity as fetch-feeds.yml.
# Required GitHub Secrets:
#   AZURE_CLIENT_ID                - Runtime user-assigned MI client ID
#   AZURE_TENANT_ID                - Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID          - Azure subscription ID
#   FOUNDRY_PROJECT_ENDPOINT       - Foundry project endpoint (for AI classification)
#
# Required GitHub Variables:
#   FOUNDRY_MODEL_DEPLOYMENT_NAME  - e.g. gpt-5.4

name: Breaking Changes Tracker

on:
  schedule:
    - cron: '0 8 * * *'   # Daily at 08:00 UTC
  workflow_dispatch:
    inputs:
      days:
        description: Number of days to look back
        required: false
        default: '1'

permissions:
  contents: write   # commit data/breaking-changes.json
  issues: write     # create GitHub Issues
  id-token: write   # OIDC token for azure/login

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Scan for breaking changes
        env:
          FOUNDRY_PROJECT_ENDPOINT: ${{ secrets.FOUNDRY_PROJECT_ENDPOINT }}
          FOUNDRY_MODEL_DEPLOYMENT_NAME: ${{ vars.FOUNDRY_MODEL_DEPLOYMENT_NAME }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TRACKER_DAYS: ${{ inputs.days || '1' }}
        run: python scripts/breaking_changes.py

      - name: Commit updated tracker state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/breaking-changes.json
          git diff --staged --quiet || git commit -m "chore: update breaking changes tracker [skip ci]"
          git push
