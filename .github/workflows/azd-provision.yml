name: Provision Azure Resources

on:
  workflow_dispatch:
    inputs:
      azure_environment_name:
        description: azd environment name
        required: true
        default: updatesrag
      azure_location:
        description: Azure region
        required: true
        default: Sweden Central
      search_service_name:
        description: Globally unique Azure AI Search service name
        required: true
        default: updatesrag
      github_branch:
        description: Git branch allowed for OIDC subject
        required: true
        default: main

permissions:
  contents: read
  id-token: write

jobs:
  provision:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up azd
        id: setup_azd
        uses: Azure/setup-azd@v1.0.0
        continue-on-error: true

      - name: Fallback install azd
        if: steps.setup_azd.outcome == 'failure'
        shell: bash
        run: |
          for attempt in 1 2 3; do
            echo "setup-azd failed. Fallback install attempt $attempt/3"
            if curl -fsSL https://aka.ms/install-azd.sh | bash; then
              break
            fi
            if [ "$attempt" = "3" ]; then
              echo "Fallback install failed after 3 attempts." >&2
              exit 1
            fi
            sleep $((attempt * 10))
          done
          echo "$HOME/.azd/bin" >> "$GITHUB_PATH"

      - name: Verify azd
        shell: bash
        run: azd version

      - name: Validate Foundry project scope
        shell: bash
        env:
          FOUNDRY_PROJECT_RESOURCE_ID: ${{ secrets.FOUNDRY_PROJECT_RESOURCE_ID }}
        run: |
          if [ -z "$FOUNDRY_PROJECT_RESOURCE_ID" ]; then
            echo "FOUNDRY_PROJECT_RESOURCE_ID is required. Set the GitHub secret FOUNDRY_PROJECT_RESOURCE_ID." >&2
            exit 1
          fi

      - name: Configure azd environment
        shell: bash
        env:
          AZURE_ENV_NAME: ${{ inputs.azure_environment_name }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_LOCATION: ${{ inputs.azure_location }}
          SEARCH_SERVICE_NAME: ${{ inputs.search_service_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_BRANCH: ${{ inputs.github_branch }}
          FOUNDRY_PROJECT_ENDPOINT: ${{ secrets.FOUNDRY_PROJECT_ENDPOINT }}
          FOUNDRY_PROJECT_RESOURCE_ID: ${{ secrets.FOUNDRY_PROJECT_RESOURCE_ID }}
          FOUNDRY_MODEL_DEPLOYMENT_NAME: ${{ vars.FOUNDRY_MODEL_DEPLOYMENT_NAME }}
        run: |
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"
          azd config set auth.useAzCliAuth true
          azd env new "$AZURE_ENV_NAME" --no-prompt
          azd env set AZURE_ENV_NAME "$AZURE_ENV_NAME"
          azd env set AZURE_SUBSCRIPTION_ID "$AZURE_SUBSCRIPTION_ID"
          azd env set AZURE_TENANT_ID "$AZURE_TENANT_ID"
          azd env set AZURE_LOCATION "$AZURE_LOCATION"
          azd env set SEARCH_SERVICE_NAME "$SEARCH_SERVICE_NAME"
          azd env set GITHUB_REPOSITORY "$GITHUB_REPOSITORY"
          azd env set GITHUB_BRANCH "$GITHUB_BRANCH"
          azd env set FOUNDRY_PROJECT_ENDPOINT "$FOUNDRY_PROJECT_ENDPOINT"
          azd env set FOUNDRY_PROJECT_RESOURCE_ID "$FOUNDRY_PROJECT_RESOURCE_ID"
          azd env set FOUNDRY_MODEL_DEPLOYMENT_NAME "$FOUNDRY_MODEL_DEPLOYMENT_NAME"

      - name: Provision infrastructure
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: azd provision --no-prompt

      - name: Show azd outputs
        run: azd env get-values